name: Deploy Site to GitHub Pages

on:
  push:
    branches: [main]
    paths:
      - "site/**"
      - "scripts/install.sh"
      - "docs/setup.html"
      - "docs/team-workflow.html"
      - "ui/public/aeo.html"
      - ".github/workflows/deploy-site.yml"

  # Allow manual trigger
  workflow_dispatch:

# Sets permissions of the GITHUB_TOKEN to allow deployment to GitHub Pages
permissions:
  contents: read
  pages: write
  id-token: write

# Allow only one concurrent deployment
concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build site output
        run: |
          mkdir -p _site

          # Copy static site files
          cp -r site/* _site/

          # Copy install script to root of site
          cp scripts/install.sh _site/install.sh

          # Copy setup guide as /setup/index.html
          mkdir -p _site/setup
          cp docs/setup.html _site/setup/index.html

          # Copy AEO page as /aeo/index.html
          mkdir -p _site/aeo
          cp ui/public/aeo.html _site/aeo/index.html

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
